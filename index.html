<!DOCTYPE html>
<html lang="de">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3036128934622320" crossorigin="anonymous"></script>
    
    <link rel="icon" type="image/png" sizes="1280x1280" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta charset="UTF-8">
    <title>Das Passwort Spiel</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #f5f5f0; 
            --card-bg: #ffffff;
            --text: #2c2c2e;
            --accent: #d4a373;
            --error: #e63946;
            --success: #2a9d8f;
            --border: #e0e0d5;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Georgia', serif;
            margin: 0; padding: 0;
            display: flex; justify-content: center;
            min-height: 100vh;
        }

        /* HEADER & LOGO STYLING FÜR ZENTRIERUNG */
        .header {
            display: flex;
            flex-direction: column; /* Stapelt Logo über Titel */
            align-items: center;    /* Zentriert beide horizontal */
            width: 100%;
            margin-bottom: 40px;    /* Abstand zum Spiel-Container */
        }

        .header img {
            height: 60px;
            margin-bottom: 20px;    /* Abstand zwischen Logo und Titel */
            cursor: pointer;
        }

        .header h1 { 
            font-size: 3.5rem; 
            font-weight: 400; 
            margin: 0;              /* Margins entfernt, da Header steuert */
            letter-spacing: -1px; 
            text-align: center; 
        }

        /* Werbe-Sidebar Styling */
        .ad-sidebar {
            width: 160px; 
            height: 600px;
            position: fixed; 
            top: 100px;
            z-index: 50;
        }
        .ad-left { left: 20px; }
        .ad-right { right: 20px; }

        @media (max-width: 1250px) { .ad-sidebar { display: none; } }

        .main-content {
            width: 100%; max-width: 700px;
            padding: 60px 20px 250px 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        #password-container {
            width: 100%; position: sticky; top: 20px;
            z-index: 100; background: var(--bg); padding-bottom: 30px;
        }

        .input-group { display: flex; gap: 8px; align-items: stretch; width: 100%; position: relative; }

        .btn-status {
            position: absolute; top: -25px; font-family: sans-serif;
            font-size: 11px; font-weight: bold; text-transform: uppercase;
            opacity: 0; transition: opacity 0.3s; pointer-events: none;
        }
        #share-status { left: 5px; color: var(--accent); }
        #reset-status { left: 63px; color: var(--error); }
        #save-status { right: 5px; color: var(--success); }

        .action-btn {
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 4px; width: 50px; cursor: pointer; color: var(--text);
            font-size: 18px; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s; box-shadow: 0 4px 20px rgba(0,0,0,0.03); flex-shrink: 0;
        }

        .action-btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-reset:hover { background: var(--error); border-color: var(--error); }

        .input-wrapper { position: relative; display: flex; align-items: center; flex-grow: 1; }

        #main-input {
            width: 100%; padding: 18px; padding-right: 65px; font-size: 22px;
            background: var(--card-bg); border: 1px solid var(--border);
            border-radius: 4px; color: var(--text); outline: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
        }

        #char-counter {
            position: absolute; right: 15px; font-family: sans-serif; font-size: 14px;
            color: var(--accent); font-weight: bold; background: #f9f9f7;
            padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border);
        }

        #reset-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content { background: var(--card-bg); padding: 30px; border-radius: 8px; text-align: center; max-width: 300px; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: sans-serif; }
        .confirm-btn { background: var(--error); color: white; }
        .cancel-btn { background: var(--border); color: var(--text); }

        #rules-container { width: 100%; display: flex; flex-direction: column-reverse; gap: 15px; }
        .rule-card {
            background: var(--card-bg); padding: 20px; border-radius: 2px;
            border: 1px solid var(--border); border-top: 4px solid var(--error);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .rule-card.valid { border-top-color: var(--success); opacity: 0.6; }
        .rule-num { font-size: 10px; text-transform: uppercase; color: var(--accent); margin-bottom: 5px; display: block; }
        
        #status-row { display: flex; justify-content: flex-end; margin-top: 10px; font-size: 11px; text-transform: uppercase; opacity: 0.5; }

        .footer-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: var(--bg); padding: 10px 0 15px 0;
            display: flex; flex-direction: column; align-items: center; z-index: 1000;
        }
        .made-by { font-family: sans-serif; font-size: 12px; opacity: 0.6; margin-bottom: 8px; }
        .social-links { width: 100%; max-width: 550px; border-top: 1px solid var(--border); padding-top: 15px; display: flex; justify-content: center; gap: 30px; }
        .social-links a { color: var(--text); text-decoration: underline; font-family: sans-serif; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .legal-links { font-size: 10px; opacity: 0.4; margin-top: 10px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div id="reset-modal">
        <div class="modal-content">
            <p style="font-family: sans-serif;">Spiel wirklich zurücksetzen?</p>
            <div class="modal-btns">
                <button class="modal-btn confirm-btn" onclick="confirmReset()">Reset</button>
                <button class="modal-btn cancel-btn" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <div class="ad-sidebar ad-left">
        <ins class="adsbygoogle"
             style="display:inline-block;width:160px;height:600px"
             data-ad-client="ca-pub-3036128934622320"
             data-ad-slot="2391622638"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="ad-sidebar ad-right">
        <ins class="adsbygoogle"
             style="display:inline-block;width:160px;height:600px"
             data-ad-client="ca-pub-3036128934622320"
             data-ad-slot="2391622638"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="main-content">
        <div class="header">
            <a href="https://johanness7.github.io/"><img src="logo.png" alt="s7 hub logo"></a>
            <h1>The Password Game</h1>
        </div>

        <div id="password-container">
            <div class="input-group">
                <span id="share-status" class="btn-status">Copied!</span>
                <span id="reset-status" class="btn-status">Reset!</span>
                <span id="save-status" class="btn-status">Saved!</span>

                <button class="action-btn" onclick="shareWebsite()" title="Share Website">
                    <i class="fa-solid fa-reply fa-flip-horizontal"></i>
                </button>

                <button class="action-btn btn-reset" onclick="openModal()" title="Reset Game">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
                
                <div class="input-wrapper">
                    <input type="text" id="main-input" placeholder="Enter password..." autocomplete="off" spellcheck="false">
                    <div id="char-counter">0</div>
                </div>

                <button class="action-btn" onclick="savePassword()" title="Save Locally">
                    <i class="fa-solid fa-floppy-disk"></i>
                </button>
            </div>
            
            <div id="status-row">
                <span>Progress: <span id="progress-text">0</span>%</span>
            </div>
        </div>

        <div id="rules-container"></div>
    </div>

    </body>
</html>
